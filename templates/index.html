<!DOCTYPE html>
<html>
<head>
    <title>ONNX Image Classifier</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f2f4f8;
            text-align: center;
            padding: 40px;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            max-width: 600px;
            margin: auto;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #45a049;
        }

        img {
            margin-top: 20px;
            max-width: 100%;
            border-radius: 8px;
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            background: #eef2ff;
            border-radius: 8px;
        }

        .error {
            color: red;
            font-weight: bold;
        }

        .bar {
            height: 20px;
            background: #ddd;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 10px;
        }

        .fill {
            height: 100%;
            background: #4CAF50;
            text-align: right;
            color: white;
            padding-right: 5px;
            line-height: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>ONNX Image Classifier</h1>

    <form method="POST" enctype="multipart/form-data">
        <input type="file" name="image" accept="image/*" required>
        <br><br>
        <button type="submit">Analyze Image</button>
    </form>

    {% if image_data %}
        <h3>Uploaded Image:</h3>
        <img src="data:image/png;base64,{{ image_data }}">
    {% endif %}

    {% if result %}
        <div class="result">
            <h3>Result</h3>

            {% if result.error %}
                <div class="error">{{ result.error }}</div>
            {% else %}
                <p><strong>Prediction:</strong> {{ result.label }}</p>
                <p><strong>Confidence:</strong> {{ result.confidence }}</p>

                <div class="bar">
                    <div class="fill" style="width: {{ result.confidence }}">
                        {{ result.confidence }}
                    </div>
                </div>
            {% endif %}
        </div>
    {% endif %}
</div>

</body>
</html>
