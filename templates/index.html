<!DOCTYPE html>
<html>
<body style="text-align:center; margin-top:50px; font-family:Arial;">

<h1>AI Image Detector</h1>

<form method="POST" enctype="multipart/form-data">
    <input type="file" name="image" required>
    <button type="submit">Check Image</button>
</form>

{% if image_data %}
    <h3>Uploaded Image:</h3>
    <img src="data:image/jpeg;base64,{{ image_data }}" width="300">
{% endif %}

{% if result %}
    <h3>Detection Result:</h3>

    {% for item in result %}
        <p><strong>{{ item.label }}</strong>: {{ (item.score * 100) | round(2) }}%</p>
    {% endfor %}
{% endif %}

</body>
</html>
