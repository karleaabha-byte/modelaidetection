<!DOCTYPE html>
<html>
<head>
    <title>AI Image Detection</title>
</head>
<body>
    <h1>Check if Image is AI Generated</h1>
    <form method="POST" enctype="multipart/form-data">
        <input type="file" name="image" accept="image/*" required>
        <button type="submit">Check</button>
    </form>

    {% if result %}
        <h2>Result:</h2>
        <pre>{{ result }}</pre>
    {% endif %}
</body>
</html>
